<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Layered claim-first model with parallel verticals</title><desc id="desc">Claim frontier above two isolated verticals, two workers, and one central integrator.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#12182a"/></linearGradient>
    <filter id="s2"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity=".42"/></filter>
    <marker id="a2" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M0 0L13 6.5L0 13Z" fill="#64748b"/></marker>
    <marker id="m2" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M0 0L13 6.5L0 13Z" fill="#5eead4"/></marker>
    <style>.title{font:700 70px Inter,system-ui,sans-serif;fill:#f8fafc}.sub{font:400 29px Inter,system-ui,sans-serif;fill:#94a3b8}.eye{font:700 21px Inter,system-ui,sans-serif;letter-spacing:3px}.head{font:700 32px Inter,system-ui,sans-serif;fill:#f8fafc}.body{font:500 23px Inter,system-ui,sans-serif;fill:#cbd5e1}.tiny{font:600 19px Inter,system-ui,sans-serif;fill:#94a3b8}</style>
  </defs>
  <rect width="2400" height="1350" fill="url(#bg2)"/>
  <text x="120" y="125" class="eye" fill="#5eead4">LAYERED CLAIM-FIRST</text><text x="120" y="210" class="title">Parallel only when isolation is real</text><text x="120" y="260" class="sub">Product reachability first. Optional execution structure second.</text>

  <rect x="120" y="330" width="2160" height="320" rx="36" fill="#111d2f" stroke="#314158" stroke-width="3"/>
  <text x="170" y="395" class="eye" fill="#5eead4">PERMANENT · CLAIM GRAPH</text>
  <g filter="url(#s2)">
    <rect x="210" y="455" width="300" height="118" rx="24" fill="#15263b" stroke="#64748b" stroke-width="3"/><text x="360" y="505" text-anchor="middle" class="head">C-1</text><text x="360" y="542" text-anchor="middle" class="body">verified</text>
    <rect x="700" y="430" width="330" height="145" rx="24" fill="#123138" stroke="#5eead4" stroke-width="4"/><text x="865" y="485" text-anchor="middle" class="head">C-2</text><text x="865" y="525" text-anchor="middle" class="body">open · reachable</text><text x="865" y="557" text-anchor="middle" class="tiny">CLAIM FRONTIER</text>
    <rect x="1190" y="430" width="330" height="145" rx="24" fill="#123138" stroke="#5eead4" stroke-width="4"/><text x="1355" y="485" text-anchor="middle" class="head">C-3</text><text x="1355" y="525" text-anchor="middle" class="body">open · reachable</text><text x="1355" y="557" text-anchor="middle" class="tiny">CLAIM FRONTIER</text>
    <rect x="1700" y="455" width="330" height="118" rx="24" fill="#171e2d" stroke="#475569" stroke-width="3"/><text x="1865" y="505" text-anchor="middle" class="head">C-4</text><text x="1865" y="542" text-anchor="middle" class="body">depends on C-2</text>
  </g>
  <path d="M510 500H675" stroke="#64748b" stroke-width="4" marker-end="url(#a2)"/><path d="M510 535C800 630 1020 630 1175 535" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a2)"/><path d="M1030 470C1200 395 1490 395 1675 470" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a2)"/>

  <rect x="270" y="730" width="1860" height="300" rx="36" fill="#17152a" stroke="#c084fc" stroke-width="3" stroke-dasharray="14 10"/>
  <text x="320" y="795" class="eye" fill="#c084fc">OPTIONAL · EXECUTION GRAPH · FRONTIER_KIND: VERTICAL</text>
  <g filter="url(#s2)">
    <rect x="430" y="845" width="650" height="135" rx="26" fill="#20203a" stroke="#60a5fa" stroke-width="3"/><text x="485" y="895" class="head">Vertical A</text><text x="485" y="937" class="body">C-2 · owner: Worker A</text><text x="820" y="895" class="tiny">FILE  src/http/**</text><text x="820" y="935" class="tiny">RUNTIME  tmp/http-a</text>
    <rect x="1320" y="845" width="650" height="135" rx="26" fill="#20203a" stroke="#60a5fa" stroke-width="3"/><text x="1375" y="895" class="head">Vertical B</text><text x="1375" y="937" class="body">C-3 · owner: Worker B</text><text x="1710" y="895" class="tiny">FILE  src/cli/**</text><text x="1710" y="935" class="tiny">RUNTIME  tmp/cli-b</text>
  </g>
  <path d="M865 575V815" stroke="#5eead4" stroke-width="4" marker-end="url(#m2)"/><path d="M1355 575V815" stroke="#5eead4" stroke-width="4" marker-end="url(#m2)"/>

  <g filter="url(#s2)">
    <rect x="430" y="1100" width="360" height="105" rx="24" fill="#14233a" stroke="#60a5fa" stroke-width="3"/><text x="610" y="1145" text-anchor="middle" class="head">Worker A</text><text x="610" y="1180" text-anchor="middle" class="tiny">evidence candidate</text>
    <rect x="1610" y="1100" width="360" height="105" rx="24" fill="#14233a" stroke="#60a5fa" stroke-width="3"/><text x="1790" y="1145" text-anchor="middle" class="head">Worker B</text><text x="1790" y="1180" text-anchor="middle" class="tiny">evidence candidate</text>
    <rect x="990" y="1080" width="420" height="145" rx="28" fill="#18312f" stroke="#5eead4" stroke-width="4"/><text x="1200" y="1138" text-anchor="middle" class="head">One Integrator</text><text x="1200" y="1178" text-anchor="middle" class="body">central reconciliation</text>
  </g>
  <path d="M610 980V1070" stroke="#60a5fa" stroke-width="4" marker-end="url(#a2)"/><path d="M1790 980V1070" stroke="#60a5fa" stroke-width="4" marker-end="url(#a2)"/>
  <path d="M790 1152H960" stroke="#64748b" stroke-width="4" marker-end="url(#a2)"/><path d="M1610 1152H1440" stroke="#64748b" stroke-width="4" marker-end="url(#a2)"/>
  <path d="M1200 1080C1200 1010 2200 1090 2200 690V390H2070" fill="none" stroke="#5eead4" stroke-width="4" stroke-dasharray="11 9" marker-end="url(#m2)"/>
  <text x="2055" y="1060" text-anchor="end" class="tiny">reconcile into product authority</text>
  <text x="1200" y="1300" text-anchor="middle" class="tiny">EXPLICIT OWNERS · DISJOINT FILE + RUNTIME SCOPE · NO CROSS-DEPENDENCY · CENTRAL RECONCILIATION</text>
</svg>

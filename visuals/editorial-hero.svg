<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350" role="img" aria-labelledby="title desc">
  <title id="title">Text-free Graph Climbing editorial hero</title><desc id="desc">Two isolated luminous verticals rise from one claim lattice while amber evidence trails reconcile into a shared mint node.</desc>

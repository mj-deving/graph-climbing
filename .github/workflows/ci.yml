name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun test
      - run: bun run graph-check starter/SPEC.md
      - run: bun run graph-check examples/notes-cli/SPEC.md
